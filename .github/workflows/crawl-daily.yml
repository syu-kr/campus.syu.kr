name: Daily Crawl - Academic, Scholarship, Events, Campus & Cafeteria Notices

on:
  schedule:
    # 매일 15시(UTC) 실행 = KST 자정(00:00)
    - cron: "0 15 * * *"
  workflow_dispatch: # 수동 실행 option

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Set timezone to KST
        run: |
          sudo ln -sf /usr/share/zoneinfo/Asia/Seoul /etc/localtime
          echo "Timezone set to KST: $(date)"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run academic notices crawler
        run: python scripts/crawl_announcements.py

      - name: Run scholarship notices crawler
        run: python scripts/crawl_scholarships.py

      - name: Run event notices crawler
        run: python scripts/crawl_events.py

      - name: Run campus life notices crawler
        run: python scripts/crawl_campus.py

      - name: Run cafeteria menu crawler
        run: python scripts/crawl_cafeteria.py

      - name: Commit changes
        run: |
          git config --local user.email "singhic@outlook.kr"
          git config --local user.name "singhic"
          git add public/data/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update daily crawl data (notices & cafeteria menu)"

      - name: Push changes
        run: git push
