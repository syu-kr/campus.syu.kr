name: Daily Crawl - Academic, Scholarship, Campus & Cafeteria Notices

on:
  schedule:
    # 매일 15시(UTC) 실행 = KST 자정(00:00)
    - cron: "0 15 * * *"
  workflow_dispatch: # 수동 실행 option

permissions:
  contents: write

concurrency:
  group: daily-crawl
  cancel-in-progress: false

jobs:
  crawl:
    if: github.repository == 'syu-kr/campus.syu.kr'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CRAWL_ACADEMIC_NOTICES_URL: ${{ vars.CRAWL_ACADEMIC_NOTICES_URL }}
      CRAWL_SCHOLARSHIP_NOTICES_URL: ${{ vars.CRAWL_SCHOLARSHIP_NOTICES_URL }}
      CRAWL_CAMPUS_NOTICES_URL: ${{ vars.CRAWL_CAMPUS_NOTICES_URL }}
      CRAWL_CAFETERIA_URL: ${{ vars.CRAWL_CAFETERIA_URL }}

    steps:
      - name: Set timezone to KST
        run: |
          sudo ln -sf /usr/share/zoneinfo/Asia/Seoul /etc/localtime
          echo "Timezone set to KST: $(date)"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run academic notices crawler
        run: python scripts/crawl_announcements.py

      - name: Run scholarship notices crawler
        run: python scripts/crawl_scholarships.py

      - name: Run campus life notices crawler
        run: python scripts/crawl_campus.py

      - name: Run cafeteria menu crawler
        run: python scripts/crawl_cafeteria.py

      - name: Commit crawler changes to main
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --global --add safe.directory "$PWD"
          git add public/data/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update daily crawl data (notices and cafeteria menu)"
          git push origin HEAD:main
