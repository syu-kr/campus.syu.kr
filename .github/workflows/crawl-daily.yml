name: Daily Crawl - Academic, Scholarship, Campus & Cafeteria Notices

on:
  schedule:
    # 매일 15시(UTC) 실행 = KST 자정(00:00)
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crawl-data-pages
  cancel-in-progress: false

jobs:
  crawl:
    if: github.repository == 'syu-kr/campus.syu.kr'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: read
    outputs:
      changed: ${{ steps.prepare.outputs.changed }}
      version: ${{ steps.prepare.outputs.version }}
    env:
      CRAWL_ACADEMIC_NOTICES_URL: ${{ vars.CRAWL_ACADEMIC_NOTICES_URL }}
      CRAWL_SCHOLARSHIP_NOTICES_URL: ${{ vars.CRAWL_SCHOLARSHIP_NOTICES_URL }}
      CRAWL_CAMPUS_NOTICES_URL: ${{ vars.CRAWL_CAMPUS_NOTICES_URL }}
      CRAWL_EVENT_NOTICES_URL: ${{ vars.CRAWL_EVENT_NOTICES_URL }}
      CRAWL_DEPARTMENT_COURSE_GUIDE_URL: ${{ vars.CRAWL_DEPARTMENT_COURSE_GUIDE_URL }}
      CRAWL_DEPARTMENT_NOTICE_MAX_PAGES: ${{ vars.CRAWL_DEPARTMENT_NOTICE_MAX_PAGES }}
      CRAWL_DEPARTMENT_NOTICE_SEARCH_TERMS: ${{ vars.CRAWL_DEPARTMENT_NOTICE_SEARCH_TERMS }}
      CRAWL_DEPARTMENT_NOTICE_SEARCH_MAX_PAGES: ${{ vars.CRAWL_DEPARTMENT_NOTICE_SEARCH_MAX_PAGES }}
      CRAWL_DEPARTMENT_NOTICE_DELAY_SECONDS: ${{ vars.CRAWL_DEPARTMENT_NOTICE_DELAY_SECONDS }}
      CRAWL_CAFETERIA_URL: ${{ vars.CRAWL_CAFETERIA_URL }}

    steps:
      - name: Set timezone to KST
        run: |
          sudo ln -sf /usr/share/zoneinfo/Asia/Seoul /etc/localtime
          echo "Timezone set to KST: $(date)"

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.13.0"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Use pinned npm
        run: npm install -g npm@10.9.4

      - name: Install Node dependencies
        run: npm ci --ignore-scripts --no-audit

      - name: Restore current crawl data snapshot
        run: npm run pull:crawl-data

      - name: Run academic notices crawler
        run: python scripts/crawl_announcements.py

      - name: Run scholarship notices crawler
        run: python scripts/crawl_scholarships.py

      - name: Run campus life notices crawler
        run: python scripts/crawl_campus.py

      - name: Run event notices crawler
        run: python scripts/crawl_events.py

      - name: Run department notices crawler
        run: python scripts/crawl_department_notices.py

      - name: Run cafeteria menu crawler
        run: python scripts/crawl_cafeteria.py

      - name: Generate announcement AI summaries
        env:
          SUPILOT_API_KEY: ${{ secrets.SUPILOT_API_KEY }}
          SUPILOT_API_BASE_URL: ${{ vars.SUPILOT_API_BASE_URL }}
          ANNOUNCEMENT_AI_LIMIT: ${{ vars.ANNOUNCEMENT_AI_LIMIT }}
          ANNOUNCEMENT_AI_DELAY_MS: ${{ vars.ANNOUNCEMENT_AI_DELAY_MS }}
          ANNOUNCEMENT_AI_CHECKPOINT_EVERY: ${{ vars.ANNOUNCEMENT_AI_CHECKPOINT_EVERY }}
          ANNOUNCEMENT_AI_MAX_RETRIES: ${{ vars.ANNOUNCEMENT_AI_MAX_RETRIES }}
          ANNOUNCEMENT_AI_RETRY_BASE_MS: ${{ vars.ANNOUNCEMENT_AI_RETRY_BASE_MS }}
          ANNOUNCEMENT_DETAIL_FETCH_ENABLED: ${{ vars.ANNOUNCEMENT_DETAIL_FETCH_ENABLED }}
          ANNOUNCEMENT_DETAIL_FETCH_TIMEOUT_MS: ${{ vars.ANNOUNCEMENT_DETAIL_FETCH_TIMEOUT_MS }}
          ANNOUNCEMENT_DETAIL_CHANGE_CHECK_ENABLED: ${{ vars.ANNOUNCEMENT_DETAIL_CHANGE_CHECK_ENABLED }}
          ANNOUNCEMENT_DETAIL_CHANGE_CHECK_LIMIT: ${{ vars.ANNOUNCEMENT_DETAIL_CHANGE_CHECK_LIMIT }}
        run: node scripts/generate_announcement_ai_summaries.mjs

      - name: Prepare versioned Pages artifact
        id: prepare
        run: npm run prepare:crawl-data-pages -- "$RUNNER_TEMP/crawl-data-pages-${GITHUB_RUN_ID}"

      - name: Configure GitHub Pages
        if: steps.prepare.outputs.changed == 'true'
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        if: steps.prepare.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/crawl-data-pages-${{ github.run_id }}
          retention-days: 1

  deploy:
    if: needs.crawl.outputs.changed == 'true'
    needs: crawl
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy crawl data to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
