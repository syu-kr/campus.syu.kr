name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  NEXT_PUBLIC_FIREBASE_API_KEY: "ci-placeholder"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "ci-placeholder.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "ci-placeholder"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "ci-placeholder.appspot.com"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:ci"
  NEXT_PUBLIC_FIREBASE_VAPID_KEY: "ci-placeholder"
  NEXT_PUBLIC_KAKAO_MAP_KEY: "ci-placeholder"
  PUSH_API_KEY: "ci-placeholder"
  RATE_LIMIT_SECRET: "ci-placeholder-rate-limit-secret"

jobs:
  verify:
    name: Audit and Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22.13.0"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Use pinned npm
        run: npm install -g npm@10.9.4

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Check
        run: npm run check
