name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  NEXT_PUBLIC_FIREBASE_API_KEY: "ci-placeholder"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "ci-placeholder.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "ci-placeholder"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "ci-placeholder.appspot.com"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:ci"
  NEXT_PUBLIC_FIREBASE_VAPID_KEY: "ci-placeholder"
  NEXT_PUBLIC_KAKAO_MAP_KEY: "ci-placeholder"
  PUSH_API_KEY: "ci-placeholder"

jobs:
  verify:
    name: Lint, Type Check, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Check unused code
        run: npm run check:unused

      - name: Check Python crawler syntax
        run: npm run check:python

      - name: Build
        run: npm run build
