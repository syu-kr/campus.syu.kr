name: Monthly Crawl - Phone & Schedule

on:
  schedule:
    # 매월 1일 00시(UTC + 0) 실행 = KST 09시
    - cron: "0 0 1 * *"
  workflow_dispatch: # 수동 실행 option

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run phone directory crawler
        run: npm run crawl:phone

      - name: Run academic schedule crawler
        run: npm run crawl:schedule

      - name: Commit changes
        run: |
          git config --local user.email "singhic@outlook.kr"
          git config --local user.name "singhic"
          git add public/data/phone-*.json public/data/schedules-*.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update monthly reference data"

      - name: Push changes
        run: git push
