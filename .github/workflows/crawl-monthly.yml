name: Monthly Crawl - Phone & Schedule

on:
  schedule:
    # 매월 1일 15시(UTC) 실행 = KST 자정(00:00)
    - cron: "0 15 1 * *"
  workflow_dispatch: # 수동 실행 option

permissions:
  contents: read

jobs:
  crawl:
    if: github.repository == 'syu-kr/campus.syu.kr'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CRAWL_PHONE_DIRECTORY_URL: ${{ vars.CRAWL_PHONE_DIRECTORY_URL }}
      CRAWL_ACADEMIC_SCHEDULE_URL: ${{ vars.CRAWL_ACADEMIC_SCHEDULE_URL }}
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
      source_ref: ${{ steps.commit.outputs.source_ref }}

    steps:
      - name: Set timezone to KST
        run: |
          sudo ln -sf /usr/share/zoneinfo/Asia/Seoul /etc/localtime
          echo "Timezone set to KST: $(date)"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run phone directory crawler
        run: python scripts/crawl_phone.py

      - name: Run academic schedule crawler
        run: python scripts/crawl_schedule.py

      - name: Commit and Push changes
        id: commit
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --global --add safe.directory "$PWD"
          git add public/data/phone-*.json public/data/schedules-*.json

          if ! git diff --cached --quiet; then
            git commit -m "chore: update monthly reference data"
            git pull --rebase origin main
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "source_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "✅ Changes pushed successfully"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "source_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No changes to commit - skipping push"
          fi
  sync-to-vercel-repo:
    name: Sync to Vercel Repository
    needs: crawl
    if: needs.crawl.outputs.changed == 'true'
    uses: ./.github/workflows/sync-to-vercel-repo.yml
    with:
      source_ref: ${{ needs.crawl.outputs.source_ref }}
      verify_before_sync: true
    secrets:
      VERCEL_PERSONAL_ACCOUNT_TOKEN: ${{ secrets.VERCEL_PERSONAL_ACCOUNT_TOKEN }}
      OFFICIAL_ACCOUNT_EMAIL: ${{ secrets.OFFICIAL_ACCOUNT_EMAIL }}
