name: Monthly Crawl - Phone, Schedule & Shuttle Bus

on:
  schedule:
    # 매월 1일 15시(UTC) 실행 = KST 자정(00:00)
    - cron: "0 15 1 * *"
  workflow_dispatch: # 수동 실행 option

permissions:
  contents: write
  pull-requests: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
      source_ref: ${{ steps.commit.outputs.source_ref }}

    steps:
      - name: Set timezone to KST
        run: |
          sudo ln -sf /usr/share/zoneinfo/Asia/Seoul /etc/localtime
          echo "Timezone set to KST: $(date)"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run phone directory crawler
        run: python scripts/crawl_phone.py

      - name: Run academic schedule crawler
        run: python scripts/crawl_schedule.py

      - name: Commit and Push changes
        id: commit
        run: |
          git config --local user.email "ssb50800@gmail.com"
          git config --local user.name "singhic"
          git config --global --add safe.directory "$PWD"
          git add public/data/phone-*.json public/data/schedules-*.json

          if ! git diff --cached --quiet; then
            git commit -m "chore: update monthly reference data"
            git pull --rebase origin main
            if ! git push origin main 2>&1; then
              echo "First push failed, trying with explicit token..."
              git push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git main
            fi
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "source_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "✅ Changes pushed successfully"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "source_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No changes to commit - skipping push"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  sync-to-vercel-repo:
    name: Sync to Vercel Repository
    needs: crawl
    if: needs.crawl.outputs.changed == 'true'
    uses: ./.github/workflows/sync-to-vercel-repo.yml
    with:
      source_ref: ${{ needs.crawl.outputs.source_ref }}
      verify_before_sync: true
    secrets: inherit
