name: Monthly Crawl - Phone & Schedule

on:
  schedule:
    # 매월 1일 15시(UTC) 실행 = KST 자정(00:00)
    - cron: "0 15 1 * *"
  workflow_dispatch: # 수동 실행 option

permissions:
  contents: write

concurrency:
  group: monthly-crawl
  cancel-in-progress: false

jobs:
  crawl:
    if: github.repository == 'syu-kr/campus.syu.kr'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CRAWL_PHONE_DIRECTORY_URL: ${{ vars.CRAWL_PHONE_DIRECTORY_URL }}
      CRAWL_ACADEMIC_SCHEDULE_URL: ${{ vars.CRAWL_ACADEMIC_SCHEDULE_URL }}

    steps:
      - name: Set timezone to KST
        run: |
          sudo ln -sf /usr/share/zoneinfo/Asia/Seoul /etc/localtime
          echo "Timezone set to KST: $(date)"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run phone directory crawler
        run: python scripts/crawl_phone.py

      - name: Run academic schedule crawler
        run: python scripts/crawl_schedule.py

      - name: Commit crawler changes to main
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --global --add safe.directory "$PWD"
          git add public/data/phone-*.json public/data/schedules-*.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update monthly reference data"
          git push origin HEAD:main
