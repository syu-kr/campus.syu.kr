name: Cleanup Expired Firestore Documents

on:
  schedule:
    # 매일 18:30 UTC (한국 시간 03:30)
    - cron: "30 18 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    if: github.repository == 'syu-kr/campus.syu.kr'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Use pinned npm
        run: npm install -g npm@10.9.4

      - name: Install dependencies
        run: npm ci

      - name: Cleanup expired Firestore documents
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
        run: npm run cleanup-expired-firestore
