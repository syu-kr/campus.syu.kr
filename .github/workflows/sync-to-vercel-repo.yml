name: Sync to Vercel Repository

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source commit SHA or ref to sync
        required: true
        default: main
        type: string
      verify_before_sync:
        description: Run lint, type-check, and build before syncing
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      source_ref:
        description: Source commit SHA or ref to sync
        required: true
        type: string
      verify_before_sync:
        description: Run lint, type-check, and build before syncing
        required: false
        default: false
        type: boolean
    secrets:
      VERCEL_PERSONAL_ACCOUNT_TOKEN:
        required: true
      OFFICIAL_ACCOUNT_EMAIL:
        required: true

concurrency:
  group: sync-to-vercel-repo-${{ github.event.workflow_run.head_branch || inputs.source_ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  NEXT_PUBLIC_FIREBASE_API_KEY: "ci-placeholder"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "ci-placeholder.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "ci-placeholder"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "ci-placeholder.appspot.com"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:ci"
  NEXT_PUBLIC_FIREBASE_VAPID_KEY: "ci-placeholder"
  NEXT_PUBLIC_KAKAO_MAP_KEY: "ci-placeholder"
  PUBLIC_DATA_SERVICE_KEY: "ci-placeholder"
  KMA_NCST_URL: "ci-placeholder"
  KMA_FCST_URL: "ci-placeholder"
  SEOUL_BUS_ARRIVAL_URL: "ci-placeholder"
  GYEONGGI_BUS_ARRIVAL_URL: "ci-placeholder"
  SHUTTLE_LOCATION_URL: "https://ci-placeholder.invalid"
  SHUTTLE_REFERER: "https://ci-placeholder.invalid/"
  SHUTTLE_USER_AGENT: "ci-placeholder"
  LECTURE_TIMETABLE_URL: "ci-placeholder"
  LIBRARY_READING_ROOMS_URL: "ci-placeholder"
  PUSH_API_KEY: "ci-placeholder"

jobs:
  sync:
    name: Sync
    if: >-
      github.repository == 'syu-kr/campus.syu.kr' &&
      (
        github.event_name != 'workflow_run' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' &&
          (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref || github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        if: inputs.verify_before_sync
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        if: inputs.verify_before_sync
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: inputs.verify_before_sync
        run: npm ci

      - name: Lint
        if: inputs.verify_before_sync
        run: npm run lint

      - name: Type check
        if: inputs.verify_before_sync
        run: npm run type-check

      - name: Check unused code
        if: inputs.verify_before_sync
        run: npm run check:unused

      - name: Check Python crawler syntax
        if: inputs.verify_before_sync
        run: npm run check:python

      - name: Build
        if: inputs.verify_before_sync
        run: npm run build

      - name: Clone destination repository
        env:
          VERCEL_PERSONAL_ACCOUNT_TOKEN: ${{ secrets.VERCEL_PERSONAL_ACCOUNT_TOKEN }}
          VERCEL_DESTINATION_REPO: ${{ vars.VERCEL_DESTINATION_REPO }}
        run: |
          if [ -z "$VERCEL_PERSONAL_ACCOUNT_TOKEN" ]; then
            echo "VERCEL_PERSONAL_ACCOUNT_TOKEN secret is not configured."
            exit 1
          fi
          if [ -z "$VERCEL_DESTINATION_REPO" ]; then
            echo "VERCEL_DESTINATION_REPO variable is not configured."
            exit 1
          fi

          DESTINATION_DIR="$(mktemp -d)"
          echo "DESTINATION_DIR=$DESTINATION_DIR" >> "$GITHUB_ENV"
          git clone --depth 1 "https://x-access-token:${VERCEL_PERSONAL_ACCOUNT_TOKEN}@github.com/${VERCEL_DESTINATION_REPO}.git" "$DESTINATION_DIR"

      - name: Copy source files
        run: |
          find "$DESTINATION_DIR" -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          rsync -a "$GITHUB_WORKSPACE"/ "$DESTINATION_DIR"/ \
            --exclude ".git/" \
            --exclude ".github/workflows/" \
            --exclude ".next/" \
            --exclude "node_modules/" \
            --exclude ".env" \
            --exclude ".env.local" \
            --exclude ".env.*.local" \
            --exclude "tsconfig.tsbuildinfo" \
            --exclude ".cache/" \
            --exclude ".cache_ggshield" \
            --exclude ".venv/" \
            --exclude "__pycache__/" \
            --exclude "*.py[cod]" \
            --exclude ".vscode/"

      - name: Push changes to destination repository
        env:
          OFFICIAL_ACCOUNT_EMAIL: ${{ secrets.OFFICIAL_ACCOUNT_EMAIL }}
        run: |
          if [ -z "$OFFICIAL_ACCOUNT_EMAIL" ]; then
            echo "OFFICIAL_ACCOUNT_EMAIL secret is not configured."
            exit 1
          fi

          cd "$DESTINATION_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "$OFFICIAL_ACCOUNT_EMAIL"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi

          git commit -m "chore: sync syu-campus for Vercel deployment"
          git push origin main
