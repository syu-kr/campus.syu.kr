name: Sync to Vercel Repository

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: sync-to-vercel-repo-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    name: Sync
    if: >-
      github.repository != 'singhic/syu-campus' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Clone destination repository
        env:
          VERCEL_PERSONAL_ACCOUNT_TOKEN: ${{ secrets.VERCEL_PERSONAL_ACCOUNT_TOKEN }}
        run: |
          if [ -z "$VERCEL_PERSONAL_ACCOUNT_TOKEN" ]; then
            echo "VERCEL_PERSONAL_ACCOUNT_TOKEN secret is not configured."
            exit 1
          fi

          DESTINATION_DIR="$(mktemp -d)"
          echo "DESTINATION_DIR=$DESTINATION_DIR" >> "$GITHUB_ENV"
          git clone --depth 1 "https://x-access-token:${VERCEL_PERSONAL_ACCOUNT_TOKEN}@github.com/singhic/syu-campus.git" "$DESTINATION_DIR"

      - name: Copy source files
        run: |
          find "$DESTINATION_DIR" -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          rsync -a "$GITHUB_WORKSPACE"/ "$DESTINATION_DIR"/ \
            --exclude ".git/" \
            --exclude ".github/workflows/" \
            --exclude ".next/" \
            --exclude "node_modules/" \
            --exclude ".env" \
            --exclude ".env.local" \
            --exclude ".env.*.local" \
            --exclude "tsconfig.tsbuildinfo" \
            --exclude ".cache/" \
            --exclude ".cache_ggshield" \
            --exclude ".venv/" \
            --exclude ".vscode/"

      - name: Push changes to destination repository
        env:
          OFFICIAL_ACCOUNT_EMAIL: ${{ secrets.OFFICIAL_ACCOUNT_EMAIL }}
        run: |
          if [ -z "$OFFICIAL_ACCOUNT_EMAIL" ]; then
            echo "OFFICIAL_ACCOUNT_EMAIL secret is not configured."
            exit 1
          fi

          cd "$DESTINATION_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "$OFFICIAL_ACCOUNT_EMAIL"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi

          git commit -m "chore: sync syu-campus for Vercel deployment"
          git push origin main
