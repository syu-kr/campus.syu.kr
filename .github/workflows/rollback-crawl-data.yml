name: Rollback Crawl Data

on:
  workflow_dispatch:
    inputs:
      version:
        description: "current.json으로 되돌릴 보존 버전"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: crawl-data-pages
  cancel-in-progress: false

jobs:
  prepare:
    if: github.repository == 'syu-kr/campus.syu.kr'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.13.0"

      - name: Use pinned npm
        run: npm install -g npm@10.9.4

      - name: Install Node dependencies
        run: npm ci --ignore-scripts --no-audit

      - name: Prepare rollback artifact
        run: >-
          npm run rollback:crawl-data --
          "${{ inputs.version }}"
          "$RUNNER_TEMP/crawl-data-pages-${GITHUB_RUN_ID}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/crawl-data-pages-${{ github.run_id }}
          retention-days: 1

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy rollback to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
