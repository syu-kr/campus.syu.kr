name: 📢 Daily Announcement Notification

on:
  schedule:
    # 평일 23:00 UTC (한국 시간 08:00) - 월-금만 실행
    - cron: "0 23 * * 0-4"
  # 수동 테스트용
  workflow_dispatch:

jobs:
  send-notification:
    if: github.repository == 'syu-kr/campus.syu.kr'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📅 Checkout code
        uses: actions/checkout@v6

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"

      - name: Use pinned npm
        run: npm install -g npm@10.9.4

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Send Daily Notification
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          PUSH_API_KEY: ${{ secrets.PUSH_API_KEY }}
          API_URL: ${{ secrets.API_URL }}
        run: npm run send-daily-notification

      - name: 📊 Log Success
        if: success()
        run: |
          echo "✅ Daily notification job completed at $(date)"
          echo "### Daily notification" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: success" >> "$GITHUB_STEP_SUMMARY"
          echo "- Completed at: $(date -u)" >> "$GITHUB_STEP_SUMMARY"

      - name: 📊 Log Failure
        if: failure()
        run: |
          echo "❌ Daily notification job failed at $(date)"
          echo "### Daily notification" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: failed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Failed at: $(date -u)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Check the Send Daily Notification step logs before rerunning. Dedupe locks may require manual inspection." >> "$GITHUB_STEP_SUMMARY"
