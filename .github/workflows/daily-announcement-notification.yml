name: 📢 Daily Announcement Notification

on:
  schedule:
    # 매일 23:00 UTC (한국 시간 08:00)
    - cron: "0 23 * * *"
  # 수동 테스트용
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📅 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Send Daily Notification
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          PUSH_API_KEY: ${{ secrets.PUSH_API_KEY }}
          API_URL: ${{ secrets.API_URL }}
        run: npm run send-daily-notification

      - name: 📊 Log Result
        if: always()
        run: echo "✅ Daily notification job completed at $(date)"
