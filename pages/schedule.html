    <!-- Main Content -->
    <main class="main-content">
        <section class="featured">

    <script src="../js/main.js"></script>
    <script>
        // нБђл°§лІБлРЬ нХЩмВђмЭЉм†Х лН∞мЭінД∞ лПЩм†Б л°ЬлУЬ л∞П л†МлНФлІБ
        async function loadSchedules() {
            try {
                const response = await fetch('../data/schedules-major.json');
                const schedules = await response.json();
                
                if (!schedules || schedules.length === 0) {
                    document.getElementById('scheduleContainer').innerHTML = 
                        '<p style="text-align: center; color: #999; padding: 40px;">лУ±л°ЭлРЬ нХЩмВђмЭЉм†ХмЭі мЧЖмКµлЛИлЛ§.</p>';
                    return;
                }

                // мЫФл≥Дл°Ь кЈЄл£єнЩФ
                const groupedByMonth = schedules.reduce((acc, schedule) => {
                    // мЛЬмЮС лВ†мІЬ нММмЛ± (нШХмЛЭ: 2026.03.01)
                    const [year, month] = schedule.startDate.split('.').slice(0, 2);
                    const key = `${year}лЕД ${month}мЫФ`;
                    
                    if (!acc[key]) {
                        acc[key] = [];
                    }
                    acc[key].push(schedule);
                    return acc;
                }, {});

                // HTML мГЭмД±
                let html = '';
                Object.entries(groupedByMonth).forEach(([monthLabel, items]) => {
                    html += `
                        <div class="schedule-month">
                            <h3 style="margin-bottom: var(--spacing-md);">${monthLabel}</h3>
                            <div class="featured-list">
                    `;

                    items.forEach(schedule => {
                        // лВ†мІЬ нММмЛ± л∞П нПђлІЈнМЕ
                        const [year, month, day] = schedule.startDate.split('.');
                        const startDay = day;
                        const endDateParts = schedule.endDate.split('.');
                        const endDay = endDateParts[2];

                        html += `
                            <div class="schedule-item">
                                <div class="schedule-date">
                                    <span class="day">${startDay}</span>
                                </div>
                                <div class="schedule-content">
                                    <h4>${schedule.title}</h4>
                                    ${schedule.description && schedule.description !== schedule.title 
                                        ? `<p style="font-size: 0.9em; color: #666; margin-top: 5px;">${schedule.description}</p>` 
                                        : ''}
                                </div>
                                <div class="schedule-status">мІДнЦЙм§С</div>
                            </div>
                        `;
                    });

                    html += `
                            </div>
                        </div>
                    `;
                });

                document.getElementById('scheduleContainer').innerHTML = html;
            } catch (error) {
                console.error('нХЩмВђмЭЉм†Х л°ЬлУЬ мЛ§нМ®:', error);
                document.getElementById('scheduleContainer').innerHTML = 
                    '<p style="text-align: center; color: #999; padding: 40px;">лН∞мЭінД∞л•Љ лґИлЯђмШђ мИШ мЧЖмКµлЛИлЛ§.</p>';
            }
        }

        // нОШмЭімІА л°ЬлУЬ мЛЬ мЛ§нЦЙ
        document.addEventListener('DOMContentLoaded', loadSchedules);
    </script>
